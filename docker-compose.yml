services:
  vuzon:
    container_name: vuzon
    image: ghcr.io/kn990x/vuzon
    env_file:
      - path: .env
        required: false
    environment:
      PORT: "8001"
    restart: unless-stopped
    # PID 1 with zombie reaping and signal forwarding: the process receives the SIGTERM
    # from `docker stop` and shuts down cleanly instead of dying on SIGKILL.
    init: true
    # The image filesystem stays read-only; the only writable path is the data volume
    # below, which holds the panel credentials (hashed) and the session signing key.
    # /tmp on tmpfs is the usual companion to read_only: it covers any temporary write
    # Node may need without granting write access to the image.
    read_only: true
    tmpfs:
      - /tmp
    volumes:
      # Losing this volume means losing the panel password: the setup wizard reopens and
      # the first visitor claims the panel. Back it up like any other homelab state.
      - vuzon-data:/app/data
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    ports:
      - "${VUZON_PORT:-8001}:8001"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:'+(process.env.PORT||8001)+'/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

volumes:
  vuzon-data:
