name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        # version from package.json#packageManager

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate repository
        run: pnpm run check

      - name: Verify Docker image build
        run: docker build -t vuzon-ci .

      # `docker build` does not prove the image boots. This smoke test runs it with the
      # same hardening as the compose file (read_only, cap_drop, no-new-privileges, data
      # volume on /app/data) and checks /healthz, the SPA HTML, and that an unconfigured
      # panel answers auth.setup_required. Setting CF_ZONE_ID and CF_ACCOUNT_ID skips
      # auto-detection, so no real Cloudflare credential is needed.
      - name: Smoke test the image (boots, hardened, serves the SPA)
        run: |
          set -euo pipefail
          docker run -d --name vuzon-smoke \
            --read-only --tmpfs /tmp \
            --cap-drop ALL --security-opt no-new-privileges:true \
            -v vuzon-smoke-data:/app/data \
            -e DOMAIN=ci-smoke-test.invalid \
            -e CF_API_TOKEN=ci-smoke-test-token \
            -e CF_ZONE_ID=ci_smoke_zone \
            -e CF_ACCOUNT_ID=ci_smoke_account \
            -p 8001:8001 vuzon-ci

          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8001/healthz > /dev/null 2>&1; then
              echo "healthz OK after ${i}s"; break
            fi
            if [ "$i" -eq 30 ]; then
              echo "The container never answered /healthz:"; docker logs vuzon-smoke; exit 1
            fi
            sleep 1
          done

          curl -fsS http://127.0.0.1:8001/ | grep -q '<div id="root">'
          # Without credentials the API must answer 401 JSON with setup_required, not the SPA.
          test "$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:8001/api/me)" = "401"
          curl -fsS http://127.0.0.1:8001/api/me | grep -q '"code":"auth.setup_required"'

      - name: Tear down smoke test
        if: always()
        run: |
          docker rm -f vuzon-smoke 2>/dev/null || true
          docker volume rm vuzon-smoke-data 2>/dev/null || true
