name: Release → GHCR

on:
  release:
    types: [published]

permissions:
  contents: write
  packages: write

jobs:
  build-and-push:
    if: ${{ !github.event.release.prerelease }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout tag
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        # version from package.json#packageManager

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate repository
        run: pnpm run check

      # Prove the tagged image boots before pushing multi-arch to GHCR. Same hardening
      # and checks as ci.yml (read_only, cap_drop, healthz, SPA, setup_required).
      - name: Build smoke image (amd64)
        run: docker build -t vuzon-release-smoke .

      - name: Smoke test the image (boots, hardened, serves the SPA)
        run: |
          set -euo pipefail
          docker run -d --name vuzon-release-smoke \
            --read-only --tmpfs /tmp \
            --cap-drop ALL --security-opt no-new-privileges:true \
            -v vuzon-release-smoke-data:/app/data \
            -e DOMAIN=ci-smoke-test.invalid \
            -e CF_API_TOKEN=ci-smoke-test-token \
            -e CF_ZONE_ID=ci_smoke_zone \
            -e CF_ACCOUNT_ID=ci_smoke_account \
            -p 8001:8001 vuzon-release-smoke

          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8001/healthz > /dev/null 2>&1; then
              echo "healthz OK after ${i}s"; break
            fi
            if [ "$i" -eq 30 ]; then
              echo "The container never answered /healthz:"; docker logs vuzon-release-smoke; exit 1
            fi
            sleep 1
          done

          curl -fsS http://127.0.0.1:8001/ | grep -q '<div id="root">'
          test "$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:8001/api/me)" = "401"
          curl -sS http://127.0.0.1:8001/api/me | grep -q '"code":"auth.setup_required"'

      - name: Tear down smoke test
        if: always()
        run: |
          docker rm -f vuzon-release-smoke 2>/dev/null || true
          docker volume rm vuzon-release-smoke-data 2>/dev/null || true
          docker rmi vuzon-release-smoke 2>/dev/null || true

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/kn990x/vuzon
          tags: |
            type=raw,value=latest
            type=semver,pattern={{version}},value=${{ github.event.release.tag_name }}
            type=semver,pattern={{major}}.{{minor}},value=${{ github.event.release.tag_name }}

      - name: Build & push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Upload release assets (Compose + env template)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # GitHub renames assets starting with "." (e.g. .env.example → default.env.example).
          # We publish env.example instead, for a stable name and clean download URLs.
          cp .env.example env.example
          gh release upload "${{ github.event.release.tag_name }}" \
            docker-compose.yml \
            env.example \
            --clobber
