version: 2
updates:
  # ecosystem "npm" also covers pnpm-lock.yaml (no separate "pnpm" ecosystem)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 10
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    groups:
      dependencies:
        patterns:
          - "*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 5

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 5
    ignore:
      # The base image stays on the Node LTS line and major bumps are reviewed by
      # hand: bumping only the Dockerfile would leave the image running a version
      # CI (node-version: 24) never tests. Moving to a new LTS means touching the
      # Dockerfile, both workflows and engines.node at the same time.
      - dependency-name: "node"
        update-types: ["version-update:semver-major"]
